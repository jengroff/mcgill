name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint with ruff
        run: uv run ruff check backend/ tests/
      - name: Type check with mypy
        run: uv run mypy backend/
      - name: Run tests with coverage
        # Coverage floor: 20% (most tests are integration tests requiring a live database;
        # raise this as unit tests are added or a CI database service is configured)
        run: uv run pytest tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=20
