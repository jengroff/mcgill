# CI/CD: Build Docker images and deploy to EC2
#
# Required GitHub repository secrets:
#   EC2_HOST    — EC2 public IP or hostname
#   EC2_USER    — SSH user (typically "ubuntu" or "ec2-user")
#   EC2_SSH_KEY — Private SSH key for the EC2 instance
#
# GITHUB_TOKEN is provided automatically and used for GHCR login.
# No additional registry credentials are needed.
#
# On the EC2 host, docker-compose.prod.yml should be present in the
# project directory. Postgres and Neo4j run independently — only the
# app and frontend containers are replaced on each deploy.

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - "pyproject.toml"
      - "uv.lock"

env:
  IMAGE_APP: ghcr.io/${{ github.repository }}
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}-frontend

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:latest
            ${{ env.IMAGE_APP }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Log in to GHCR (the token is passed as the password)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker pull ${{ env.IMAGE_APP }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # Navigate to the project directory
            cd ~/mcgill

            # Restart app and frontend — databases stay running
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate app frontend caddy

            # Remove old dangling images to reclaim disk space
            docker image prune -f
