# Production compose file for deployment.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Caddy handles HTTPS via Let's Encrypt.
# Postgres and Neo4j ports are NOT exposed to the host — they are
# only reachable by the app container over the internal network.
#
# Place a .env file alongside this file with any runtime secrets
# (API keys, JWT_SECRET_KEY, etc.). Database credentials below can
# also be moved there if desired.
#
# ── Fork checklist ──
# 1. Update the Caddyfile with your own domain
# 2. Change the GHCR image paths below to your own registry
# 3. Set ALLOWED_ORIGINS in .env to your production domain
# 4. Set a strong JWT_SECRET_KEY in .env
# 5. Change the default database passwords below (or move to .env)

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  frontend:
    image: ghcr.io/jengroff/mcgill-frontend:latest
    expose:
      - "5174"
    depends_on:
      - app
    restart: unless-stopped

  app:
    image: ghcr.io/jengroff/mcgill:latest
    expose:
      - "8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mcgill:mcgilldev@postgres:5432/mcgill
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mcgilldev
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: mcgill
      POSTGRES_PASSWORD: mcgilldev
      POSTGRES_DB: mcgill
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcgill"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/mcgilldev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  neo4j_data:
  neo4j_logs:
  caddy_data:
  caddy_config:
